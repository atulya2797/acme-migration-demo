name: Publish to QA

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build cloudsmith-cli

      - name: Build package
        working-directory: acme-data-utils
        run: python -m build

      - name: Publish to Cloudsmith
        working-directory: acme-data-utils
        run: |
          cloudsmith push python atulya_s/acme-pypi-qa dist/*.whl
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}